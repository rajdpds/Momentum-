<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPARTAN GYM</title>

<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    font-family:'Oswald',sans-serif;
    background:#000;
    color:#ff0000;
}

/* HEADER */
header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 40px;
}

.logo{
    font-size:36px;
    font-weight:700;
}

.join-btn{
    background:transparent;
    border:2px solid #ff0000;
    color:#ff0000;
    padding:10px 25px;
    border-radius:30px;
    cursor:pointer;
}

.join-btn:hover{
    background:#ff0000;
    color:#000;
}

/* HERO */
.hero{
    width:100%;
    max-height:500px;
    overflow:hidden;
}

.hero img{
    width:100%;
    height:500px;
    object-fit:cover;
}

/* GRID 2x5 */
.equipment-section{
    width:95%;
    max-width:1400px;
    margin:60px auto;
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:40px;
}

.equipment-card{
    background:#111;
    border:1px solid #ff0000;
    border-radius:25px;
    padding:25px;
    text-align:center;
    cursor:pointer;
}

.equipment-card img{
    width:100%;
    height:200px;
    object-fit:cover;
    border-radius:15px;
}

.equipment-card p{
    margin-top:15px;
    font-size:20px;
    font-weight:600;
}

/* IMPORTANT FIX — SAME WIDTH AS 2 GRID COLUMNS */
.full-width-2{
    grid-column: span 2;
}

/* CARD STYLE */
.card{
    padding:40px;
    background:#111;
    border-radius:25px;
    border:1px solid #ff0000;
    text-align:center;
    font-size:22px;
    margin-top:20px;
}

/* LOCATION */
.location a{
    color:#ff0000;
    text-decoration:none;
}

/* NEW OVERLAY */
.overlay{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.9);
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.overlay-content{
    width:85%;
    max-width:900px;
    background:#111;
    border:1px solid #ff0000;
    border-radius:25px;
    padding:40px;
    max-height:85vh;
    overflow-y:auto;
    position:relative;
}

.overlay-close{
    position:absolute;
    top:15px;
    right:20px;
    font-size:24px;
    cursor:pointer;
}

.exercise-block{
    margin-bottom:35px;
}

.exercise-img{
    width:100%;
    height:200px;
    border:1px dashed #ff0000;
    border-radius:15px;
    display:flex;
    align-items:center;
    justify-content:center;
    margin-top:10px;
    font-size:14px;
}

@media(max-width:1000px){
    .equipment-section{
        grid-template-columns:repeat(2,1fr);
    }
}

</style>
</head>
<body>

<header>
    <div class="logo">SPARTAN GYM</div>
    <button class="join-btn" onclick="payNow()">JOIN</button>
</header>

<div class="hero">
    <img src="header.jpg">
</div>

<div style="text-align:center; font-size:38px; margin:40px 0; letter-spacing:3px;">
    EQUIPMENT AVAILABLE
</div>

<div class="equipment-section">

    <div class="equipment-card" onclick="openOverlay('Stationary Bike')">
        <img src="bike.jpg">
        <p>Stationary Bike</p>
    </div>

    <div class="equipment-card" onclick="openOverlay('Kettlebell')">
        <img src="kettlebell.jpg">
        <p>Kettlebell</p>
    </div>

    <div class="equipment-card" onclick="openOverlay('Barbell')">
        <img src="barbell.jpg">
        <p>Barbell</p>
    </div>

    <div class="equipment-card" onclick="openOverlay('Lat Pulldown')">
        <img src="lat.jpg">
        <p>Lat Pulldown</p>
    </div>

    <div class="equipment-card" onclick="openOverlay('Bench Press')">
        <img src="bench.jpg">
        <p>Bench Press</p>
    </div>

    <div class="equipment-card" onclick="openOverlay('Squat Rack')">
        <img src="squat.jpg">
        <p>Squat Rack</p>
    </div>

    <div class="equipment-card" onclick="openOverlay('Dumbbells')">
        <img src="dumbbell.jpg">
        <p>Dumbbells</p>
    </div>

    <div class="equipment-card" onclick="openOverlay('Treadmill')">
        <img src="treadmill.jpg">
        <p>Treadmill</p>
    </div>

    <div class="equipment-card" onclick="openOverlay('Cable Machine')">
        <img src="cable.jpg">
        <p>Cable Machine</p>
    </div>

    <div class="equipment-card" onclick="openOverlay('Smith Machine')">
        <img src="smith.jpg">
        <p>Smith Machine</p>
    </div>

    <div class="full-width-2">
        <div class="card">
            About Plans<br><br>
            Joining – 1500/-<br>
            Monthly – 500/-
        </div>
    </div>

    <div class="full-width-2">
        <div class="card location">
            📍 <a href="https://maps.app.goo.gl/AsagDupfQSvw7a4j6?g_st=aw" target="_blank">
            View Gym Location on Google Maps
            </a>
        </div>
    </div>

</div>

<!-- OVERLAY -->
<div class="overlay" id="overlay">
    <div class="overlay-content">
        <div class="overlay-close" onclick="closeOverlay()">❌</div>
        <h2 id="overlayTitle" style="text-align:center; margin-bottom:30px;"></h2>
        <div id="overlayExercises"></div>
    </div>
</div>

<script>

const exerciseData = {
    "Stationary Bike":["Cardio Burn","HIIT Ride","Endurance Cycling"],
    "Kettlebell":["Kettlebell Swings","Goblet Squats","Turkish Get-Up"],
    "Barbell":["Deadlift","Bench Press","Overhead Press"],
    "Lat Pulldown":["Wide Grip Pulldown","Close Grip Pulldown","Reverse Grip Pulldown"],
    "Bench Press":["Flat Bench Press","Incline Press","Close Grip Press"],
    "Squat Rack":["Back Squat","Front Squat","Lunges"],
    "Dumbbells":["Bicep Curl","Shoulder Press","Dumbbell Fly"],
    "Treadmill":["Sprint Intervals","Incline Walk","Fat Burn Run"],
    "Cable Machine":["Cable Fly","Tricep Pushdown","Cable Row"],
    "Smith Machine":["Smith Squat","Smith Bench Press","Calf Raises"]
};

function openOverlay(machine){
    document.getElementById("overlay").style.display="flex";
    document.getElementById("overlayTitle").innerText=machine;

    let container=document.getElementById("overlayExercises");
    container.innerHTML="";

    exerciseData[machine].forEach(ex=>{
        container.innerHTML+=`
        <div class="exercise-block">
            <h3>${ex}</h3>
            <div class="exercise-img">
                Add Exercise Image Here
            </div>
        </div>
        `;
    });
}

function closeOverlay(){
    document.getElementById("overlay").style.display="none";
}

function payNow(){
    window.location.href="upi://pay?pa=8638136604@ibl&pn=SPARTANGYM&cu=INR";
}

</script>

</body>
</html>
